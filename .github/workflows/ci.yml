name: CI

on:
  push:
    branches:
      - master

jobs: 
    build:
      name: 'Build and Push'
      runs-on: ubuntu-latest

      steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'yarn'
      
      - run: yarn
      - run: yarn run test
